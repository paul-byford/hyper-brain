name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  functional:
    name: Pillar 1 - functional
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install
        # Include the serving [mcp] and agent extras so the MCP server, auth, and
        # deterministic agent tests all run here (phases 3-4). The slower ADK ROUGE
        # evals are marked `eval` and run in the Pillar 3 job instead.
        run: pip install -e ./app[dev,mcp,agent]
      - name: Lint
        run: |
          ruff check app
          ruff format --check app
      - name: Unit and integration tests
        run: pytest app/tests -q -m "not eval"
      # Brain Explorer UI (phase 7): export its data, then run the JS logic tests
      # (isolation, scoped search, graph filtering) under node.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: UI logic tests
        run: |
          python scripts/export_ui_data.py
          node --check ui/lib.js
          node --check ui/app.js
          node ui/test/lib.test.mjs

  security:
    name: Pillar 2 - security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install
        run: pip install -e ./app[dev]
      - name: SAST (bandit)
        run: bandit -q -r app/brain_app
      - name: Dependency audit (pip-audit)
        run: pip-audit -r app/requirements.txt
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Infrastructure: validate + policy-as-code (phase 5). All of this runs with
      # no cloud: fmt/validate check the config against the provider schema, and
      # checkov + conftest assert the security properties statically.
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
      - name: Terraform fmt & validate
        run: |
          terraform -chdir=infra fmt -check -recursive
          terraform -chdir=infra init -backend=false -input=false
          terraform -chdir=infra validate
          terraform -chdir=infra/bootstrap init -backend=false -input=false
          terraform -chdir=infra/bootstrap validate
      - name: Checkov (infra policy)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra
      - name: Conftest (custom policy)
        run: |
          CF=0.56.0
          curl -fsSL -o conftest.tar.gz \
            "https://github.com/open-policy-agent/conftest/releases/download/v${CF}/conftest_${CF}_Linux_x86_64.tar.gz"
          tar xzf conftest.tar.gz conftest
          TF_FILES=$(find infra -name '*.tf')
          ./conftest test $TF_FILES -p infra/policy/security.rego
          ./conftest test $TF_FILES --combine --namespace controlled -p infra/policy/controlled.rego

  evals:
    name: Pillar 3 - AI evals (offline tier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install
        # The agent extra provides ADK's eval framework for the offline eval tier.
        run: pip install -e ./app[dev,agent]
      - name: Offline evals
        run: pytest app/tests -q -m eval
